name: Bug Report
description: Report a defect in tfscaffold
labels: ['type:bug']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much
        detail as you can — it helps us reproduce and fix the issue faster.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Run `bin/terraform.sh -a plan -p myproject -c mycomponent -e dev -r eu-west-2`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened. Include error messages and terminal output.
    validations:
      required: true

  - type: input
    id: tfscaffold-version
    attributes:
      label: tfscaffold Version
      description: Output of `bin/terraform.sh --version`
      placeholder: 'e.g. 2.3.3'
    validations:
      required: true

  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Output of `terraform --version`
      placeholder: 'e.g. Terraform v1.10.0'

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (x86_64)
        - Linux (ARM)
        - Windows (WSL)
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: e.g. Ubuntu 22.04, macOS 14.2
      placeholder: 'e.g. Ubuntu 22.04'

  - type: input
    id: shell
    attributes:
      label: Shell
      description: e.g. bash 5.2, zsh 5.9
      placeholder: 'e.g. bash 5.2'

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - scaffold-core
        - bootstrap
        - components
        - modules
        - state-management
        - variables
        - hooks
        - platform
        - documentation
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else — logs, screenshots, config, workarounds tried.
